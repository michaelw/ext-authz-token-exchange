name: Setup Helm
description: Install the Helm version used by repository workflows.

inputs:
  version:
    description: Helm version to install.
    required: false
    default: v4.1.1

runs:
  using: composite
  steps:
    - name: Set up Helm
      uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      with:
        version: ${{ inputs.version }}
