name: Test Published Chart

on:
  workflow_dispatch:
    inputs:
      version:
        description: Chart version to test, without a leading v.
        required: true
        type: string

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CHART_NAME: ext-authz-token-exchange
  CHART_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}

jobs:
  test-published-chart:
    name: Test published chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Helm
        uses: ./.github/actions/setup-helm

      - name: Log in to GHCR for Helm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.actor }}
        run: |
          echo "$GITHUB_TOKEN" | helm registry login ghcr.io \
            --username "$GITHUB_USERNAME" \
            --password-stdin

      - name: Validate published chart
        run: |
          VERSION="${{ inputs.version }}"
          helm pull "${CHART_REGISTRY}/${CHART_NAME}" --version "$VERSION"
          tar -tf "${CHART_NAME}-${VERSION}.tgz" | head -10
          helm show chart "${CHART_REGISTRY}/${CHART_NAME}" --version "$VERSION"
          helm show values "${CHART_REGISTRY}/${CHART_NAME}" --version "$VERSION"
