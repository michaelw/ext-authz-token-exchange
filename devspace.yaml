version: v2beta1
name: ext-authz-token-exchange

require:
  commands:
    - name: yq
      versionArgs: ["--version"]
      versionRegEx: "yq \\(https://github.com/mikefarah/yq/\\) version (v\\d+\\.\\d+\\.\\d+)"
      version: ">= 4"

# Variables for configuration
vars:
  DEVSPACE_USER: $(tr -d '._' <<< ${USER:-$(whoami)})
  CONTAINER_USER_HOME: /home/devuser
  REGISTRY:
    value: "ghcr.io/michaelw"
  DEV_REGISTRY:
    value: "ghcr.io/michaelw"
  IMAGE_NAME:
    value: "ext-authz-token-exchange"
  FAKE_TOKEN_ENDPOINT_IMAGE_NAME:
    value: "ext-authz-token-exchange-fake-token-endpoint"
  IMAGE_TAG: $(git describe --always --dirty="-dirty-${DEVSPACE_TIMESTAMP}")
  DEV_TAG:
    value: "dev-${DEVSPACE_USER}-${DEVSPACE_TIMESTAMP}"
  PROD_TAG:
    value: "latest" # XXX versioning scheme for production images

profiles:
  - name: with-infra
    merge:
      dependencies:
        infra:
          git: https://github.com/michaelw/devspace-starter-pack
  - name: local-test
    merge:
      deployments:
        ext-authz-token-exchange-e2e:
          namespace: ext-authz-token-exchange-e2e
          helm:
            releaseName: ext-authz-token-exchange-e2e
            chart:
              name: ./charts/ext-authz-token-exchange-e2e
            values:
              host: httpbin.int.kube
              namespacePrefix: service
              systemNamespace: ext-authz-token-exchange-e2e
              fakeTokenEndpoint:
                image: ghcr.io/michaelw/ext-authz-token-exchange-fake-token-endpoint
    patches:
      - op: replace
        path: pipelines.deploy.run
        value: |-
          run_dependencies --all
          ensure_pull_secrets --all
          build_images prod fake-token-endpoint
          helm dependency build charts/ext-authz-token-exchange
          for ns in service-yellow service-red service-blue; do
            kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f -
            kubectl label namespace "$ns" ext-authz-token-exchange.magneticflux.net/policy=enabled --overwrite
          done
          create_deployments --all

# Images to build and push
images:
  # Development image - not pushed to production registry
  dev:
    image: ${DEV_REGISTRY}/${IMAGE_NAME}-dev
    dockerfile: ./Dockerfile
    target: dev
    buildKit: &buildKit
      {}
    tags:
      - ${DEV_TAG}
      - dev
    skipPush: true # Never push dev images to registry

  # Production image - for deployment and dependencies
  prod:
    image: ${REGISTRY}/${IMAGE_NAME}
    dockerfile: ./Dockerfile
    target: prod
    buildKit: *buildKit
    tags:
      - "${IMAGE_TAG}"
      - ${PROD_TAG}
    # This will be pushed to registry for others to use

  fake-token-endpoint:
    image: ${REGISTRY}/${FAKE_TOKEN_ENDPOINT_IMAGE_NAME}
    dockerfile: ./Dockerfile
    target: fake-token-endpoint
    buildKit: *buildKit
    tags:
      - "${IMAGE_TAG}"
      - ${PROD_TAG}

# Deployments - Kubernetes manifests
deployments:
  ext-authz-token-exchange:
    namespace: ext-authz-token-exchange
    updateImageTags: false
    helm:
      releaseName: ext-authz-token-exchange
      chart:
        name: ./charts/ext-authz-token-exchange
      values:
        image:
          repository: ${runtime.images.prod.image}
          tag: ${runtime.images.prod.tag}
        env:
          TOKEN_EXCHANGE_ALLOW_HTTP_TOKEN_ENDPOINT: "true"
          TOKEN_EXCHANGE_BEARER_REALM: ext-authz-token-exchange-e2e
          TOKEN_EXCHANGE_DEFAULT_TOKEN_ENDPOINT: http://fake-token-endpoint.ext-authz-token-exchange-e2e.svc.cluster.local:8080/token/success
          # INSECURE DEMO-ONLY TOKEN LOGGING: DO NOT COPY THIS VALUE INTO PRODUCTION.
          TOKEN_EXCHANGE_INSECURE_LOG_TOKENS: "true"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        oauth:
          createSecret: true
          secretName: ext-authz-token-exchange-oauth
          clientID: e2e-client
          clientSecret: e2e-secret
          existingSecret:
            name: ext-authz-token-exchange-oauth
            clientIDKey: client_id
            clientSecretKey: client_secret

# Development configuration
dev:
  ext-authz-token-exchange:
    imageSelector: ${REGISTRY}/${IMAGE_NAME}
    devImage: ${DEV_REGISTRY}/${IMAGE_NAME}-dev

    env: []

    resources:
      requests:
        cpu: 1000m
        memory: 1024Mi

    # Patch Kubernetes resources last-mile
    patches:
      # Override security context for development
      - op: add
        path: spec.containers[*].securityContext.allowPrivilegeEscalation
        value: true

    # Sync local files to container
    sync:
      - path: ./
        startContainer: true
      - path: "${DEVSPACE_USER_HOME}/.gitconfig:${CONTAINER_USER_HOME}/.gitconfig"
        file: true
        disableDownload: true

    # Port forwarding for development
    ports:
      - port: "3001" # gRPC ext-authz service

    persistPaths:
    - path: /go-cache
      skipPopulate: true
      # Optional path on the persistent volume to mount
      # volumePath: my-volume/app

    ssh:
      localHostname: ${DEVSPACE_NAME}.devspace

    proxyCommands:
      - gitCredentials: true
      - command: kubectl

    workingDir: /workspaces/${DEVSPACE_NAME}

    terminal:
      command: bash .devcontainer/start.sh

    command: ["/entrypoint.sh"]
    args: ["air"]

    restartHelper:
      inject: true

pipelines:
  # Pipeline for development
  dev:
    flags:
    - name: logs
      short: l
    - name: vscode
    run: |-
      LOGS_ENABLED=false
      TERMINAL_ENABLED=true
      if [ $(get_flag "logs") == "true" ]; then
        LOGS_ENABLED=true
        TERMINAL_ENABLED=false
      fi

      run_dependencies --all
      ensure_pull_secrets --all
      build_images dev
      create_deployments --all
      start_dev --all --set "terminal.enabled=$TERMINAL_ENABLED" --set "logs.enabled=$LOGS_ENABLED"
      if [ $(get_flag "vscode") == "true" ]; then
        code --folder-uri vscode-remote://ssh-remote+${DEVSPACE_NAME}.devspace/workspaces/${DEVSPACE_NAME}
      fi

  # Pipeline for regular deployment
  deploy:
    run: |-
      run_dependencies --all
      ensure_pull_secrets --all
      build_images prod
      helm dependency build charts/ext-authz-token-exchange
      create_deployments --all

commands:
  # sections:
  #   build:
  #     Commands that can be executed in a dev container
  #   images:
  #     Commands related to building and pushing Docker images
  #   deploy:
  #     Commands related to deploying the service to Kubernetes
  setup:
    description: "Setup the development environment"
    section: build
    command: |
      echo "I: target=setup"
      go install github.com/go-delve/delve/cmd/dlv@v1.26.3
      go install github.com/air-verse/air@v1.65.1

  generate:
    description: "Generate required code and download dependencies"
    section: build
    command: |
      echo "I: target=generate"
      go mod download

  compile:
    description: "Compile the code base"
    section: build
    command: |
      echo "I: target=compile"
      go mod download
      go build -v ./cmd/...

  build:
    description: "Build all commands"
    section: build
    command: |
      echo "I: target=build"
      go mod download
      go build ./cmd/...

  test:
    description: "Run all tests"
    section: build
    command: |
      echo "I: target=test"
      go mod download
      go build ./cmd/...
      go test -v ./...

  coverage:
    description: "Run Go tests with coverage"
    section: build
    command: |
      echo "I: target=coverage"
      go test -coverprofile=coverage.out ./...

  actionlint:
    description: "Lint GitHub Actions workflows"
    section: build
    command: |
      echo "I: target=actionlint"
      go run github.com/rhysd/actionlint/cmd/actionlint@latest

  lint:
    description: "Run repository lint checks"
    section: build
    command: |
      echo "I: target=lint"
      pre-commit run --all-files
      go run github.com/rhysd/actionlint/cmd/actionlint@latest

  helm-verify:
    description: "Verify Helm chart dependencies, lint, and rendering"
    section: build
    command: |
      echo "I: target=helm-verify"
      helm dependency build charts/ext-authz-token-exchange
      helm lint charts/ext-authz-token-exchange
      helm lint charts/ext-authz-token-exchange-e2e
      helm template ext-authz-token-exchange charts/ext-authz-token-exchange \
        --namespace ext-authz-token-exchange \
        > /tmp/ext-authz-token-exchange-rendered.yaml
      helm template ext-authz-token-exchange-e2e charts/ext-authz-token-exchange-e2e \
        --namespace ext-authz-token-exchange-e2e \
        > /tmp/ext-authz-token-exchange-e2e-rendered.yaml

  verify:
    description: "Run CI-equivalent local validation without a Kubernetes cluster"
    section: build
    command: |
      echo "I: target=verify"
      echo "I: target=lint"
      pre-commit run --all-files
      go run github.com/rhysd/actionlint/cmd/actionlint@latest
      echo "I: target=test"
      go mod download
      go build ./cmd/...
      go test -v ./...
      echo "I: target=coverage"
      go test -coverprofile=coverage.out ./...
      echo "I: target=build"
      go mod download
      go build ./cmd/...
      echo "I: target=helm-verify"
      helm dependency build charts/ext-authz-token-exchange
      helm lint charts/ext-authz-token-exchange
      helm lint charts/ext-authz-token-exchange-e2e
      helm template ext-authz-token-exchange charts/ext-authz-token-exchange \
        --namespace ext-authz-token-exchange \
        > /tmp/ext-authz-token-exchange-rendered.yaml
      helm template ext-authz-token-exchange-e2e charts/ext-authz-token-exchange-e2e \
        --namespace ext-authz-token-exchange-e2e \
        > /tmp/ext-authz-token-exchange-e2e-rendered.yaml

  smoke:
    description: "Deploy local-test and run Kubernetes e2e smoke tests"
    section: build
    command: |
      echo "I: target=smoke"
      devspace deploy -p local-test
      E2E_BASE_URL="${E2E_BASE_URL:-https://httpbin.int.kube}" \
      E2E_SKIP_INSTALL="${E2E_SKIP_INSTALL:-true}" \
      go run github.com/onsi/ginkgo/v2/ginkgo -r "$@" ./test/e2e

  test-e2e:
    description: "Run Kubernetes e2e tests against the local-test deployment"
    section: build
    command: |
      echo "I: target=test-e2e"
      E2E_BASE_URL="${E2E_BASE_URL:-https://httpbin.int.kube}" \
      E2E_SKIP_INSTALL="${E2E_SKIP_INSTALL:-true}" \
      go run github.com/onsi/ginkgo/v2/ginkgo -r "$@" ./test/e2e

  demo-dashboard:
    description: "Start the local token exchange demo dashboard"
    section: build
    command: |
      echo "I: target=demo-dashboard"
      go run ./cmd/demo-dashboard $@

  start:
    description: "Start the application"
    section: build
    command: |
      echo "I: target=start"
      if ! pgrep air >/dev/null; then
        go run ./cmd/ext-authz-token-exchange-service $@
      else
        echo "I: using air, nothing to do here"
      fi

  build-images:
    description: "Build Docker images for development and production environments"
    section: images
    command: |
      devspace build $@

  deploy:
    description: "Deploy the service to Kubernetes"
    section: deploy
    command: |
      devspace deploy $@

  dev:
    description: "Start development environment"
    section: deploy
    command: |
      devspace dev $@

  helm:
    description: "Run Helm commands"
    section: deploy
    command: |
      helm $@

  k:
    description: "Run kubectl commands"
    section: deploy
    command: |
      kubectl $@

  k9s:
    description: "Run k9s, the Kubernetes terminal UI"
    section: deploy
    command: |
      k9s $@

  logs:
    description: "View logs from the deployed service pods"
    section: deploy
    command: |
      devspace logs $@
