version: v2beta1
name: ext-authz-token-exchange

require:
  commands:
    - name: yq
      versionArgs: ["--version"]
      versionRegEx: "yq \\(https://github.com/mikefarah/yq/\\) version (v\\d+\\.\\d+\\.\\d+)"
      version: ">= 4"

# Variables for configuration
vars:
  DEVSPACE_USER: $(tr -d '._' <<< ${USER:-$(whoami)})
  CONTAINER_USER_HOME: /home/devuser
  DNS_DOMAIN:
    value: kube
  GKE_DNS_DOMAIN:
    value: gcp.kube
  DNS_MODE:
    value: local
  DNS_SERVICE_ID:
    value: kube
  GKE_DNS_ZONE:
    value: ""
  GKE_PROJECT_ID:
    command: ./scripts/starter-pack-env.sh
    args: ["get", "GKE_PROJECT_ID", "", "${DEVSPACE_CONTEXT}"]
  GKE_REGION:
    command: ./scripts/starter-pack-env.sh
    args: ["get", "GKE_REGION", "", "${DEVSPACE_CONTEXT}"]
  GKE_GATEWAY_NAMESPACE:
    value: gke-gateway
  GKE_GATEWAY_NAME:
    value: gateway
  GKE_GATEWAY_SECTION_NAME:
    value: https
  GKE_EXTERNAL_SCHEME:
    value: https
  GKE_GATEWAY_IP:
    value: ""
  GKE_DEPLOYMENT_DOMAIN:
    value: ""
  GKE_HTTPBIN_HOST:
    value: httpbin.${GKE_DEPLOYMENT_DOMAIN}
  GKE_KEYCLOAK_HOST:
    value: keycloak.${GKE_DEPLOYMENT_DOMAIN}
  GKE_PLATFORM_NAMESPACE:
    value: txe-platform
  GKE_PLATFORM_TEAMS:
    value: yellow,red,blue,green
  GKE_TEAM_NAMESPACE_PREFIX:
    value: txe-team
  GKE_TEAM_PATH_ROOT:
    value: /anything/txe
  GKE_TEAM_NAME:
    value: yellow
  GKE_TEAM_NAMESPACE:
    value: ${GKE_TEAM_NAMESPACE_PREFIX}-${GKE_TEAM_NAME}
  GKE_IMAGE_TAG:
    command: yq
    args: ["-r", ".appVersion", "charts/ext-authz-token-exchange/Chart.yaml"]
  DNS_NAMESERVERS:
    value: ""
  HOST_INTEGRATION:
    value: "true"
  GATEWAY_PROVIDER:
    command: ./scripts/starter-pack-env.sh
    args: ["gateway-provider", "${DEVSPACE_CONTEXT}"]
  DEPLOYMENT_DOMAIN:
    command: ./scripts/starter-pack-env.sh
    args: ["get", "DEPLOYMENT_DOMAIN", "int.kube", "${DEVSPACE_CONTEXT}"]
  GATEWAY_NAMESPACE:
    command: ./scripts/starter-pack-env.sh
    args: ["get", "GATEWAY_NAMESPACE", "gke-gateway", "${DEVSPACE_CONTEXT}"]
  DEV_REGISTRY_IMAGE_PREFIX:
    command: ./scripts/starter-pack-env.sh
    args: ["get", "DEV_REGISTRY_IMAGE_PREFIX", "", "${DEVSPACE_CONTEXT}"]
  REGISTRY:
    command: ./scripts/starter-pack-env.sh
    args: ["get", "REGISTRY", "ghcr.io/michaelw", "${DEVSPACE_CONTEXT}"]
  DEV_REGISTRY:
    command: ./scripts/starter-pack-env.sh
    args: ["get", "DEV_REGISTRY", "ghcr.io/michaelw", "${DEVSPACE_CONTEXT}"]
  IMAGE_NAME:
    value: "ext-authz-token-exchange"
  FAKE_TOKEN_ENDPOINT_IMAGE_NAME:
    value: "ext-authz-token-exchange-fake-token-endpoint"
  IMAGE_TAG: $(git describe --always --dirty="-dirty-${DEVSPACE_TIMESTAMP}")
  DEV_TAG:
    value: "dev-${DEVSPACE_USER}-${DEVSPACE_TIMESTAMP}"
  PROD_TAG:
    value: "latest" # XXX versioning scheme for production images
profiles:
  - name: with-infra
    merge:
      dependencies:
        infra:
          git: https://github.com/michaelw/devspace-starter-pack
          profiles:
            - with-test
  - name: with-test
    activation:
      - vars:
          DEVSPACE_CONTEXT: .+
    merge:
      deployments:
        ext-authz-token-exchange:
          helm:
            values:
              gatewayProvider: ${GATEWAY_PROVIDER}
              envoyFilter:
                enabled: false
              gkeAuthz:
                gateway:
                  namespace: ${GATEWAY_NAMESPACE}
                host: httpbin.${DEPLOYMENT_DOMAIN}
                callout:
                  tls:
                    certificate:
                      dnsNames:
                        - gateway-ext-authz.${GATEWAY_NAMESPACE}.svc.cluster.local
              gkeExtProc:
                host: httpbin.${DEPLOYMENT_DOMAIN}
              grafanaDashboard:
                enabled: true
                providerCluster: outbound|3001||gateway-ext-authz.istio-ingress.svc.cluster.local
              env:
                TOKEN_EXCHANGE_ALLOW_HTTP_TOKEN_ENDPOINT: "true"
                TOKEN_EXCHANGE_BEARER_REALM: ext-authz-token-exchange-e2e
                # INSECURE DEMO-ONLY TOKEN LOGGING: DO NOT COPY THIS VALUE INTO PRODUCTION.
                TOKEN_EXCHANGE_INSECURE_LOG_TOKENS: "true"
              oauth:
                createSecret: true
                secretName: ext-authz-token-exchange-fake-issuer-oauth
                clientID: e2e-client
                clientSecret: e2e-secret
                existingSecret:
                  name: ext-authz-token-exchange-fake-issuer-oauth
                  clientIDKey: client_id
                  clientSecretKey: client_secret
              issuerProfiles:
                profiles:
                  - name: fake-issuer
                    tokenEndpoint: http://fake-token-endpoint.ext-authz-token-exchange-e2e.svc.cluster.local:8080/token/success
                    bearerRealm: ext-authz-token-exchange-e2e
                    tokenEndpointAuthMethod: client_secret_basic
                    clientIDSecretRef:
                      name: ext-authz-token-exchange-fake-issuer-oauth
                      key: client_id
                    clientSecretSecretRef:
                      name: ext-authz-token-exchange-fake-issuer-oauth
                      key: client_secret
        ext-authz-token-exchange-e2e:
          namespace: ext-authz-token-exchange-e2e
          helm:
            releaseName: ext-authz-token-exchange-e2e
            chart:
              name: ./charts/ext-authz-token-exchange-e2e
            values:
              gatewayProvider: ${GATEWAY_PROVIDER}
              host: httpbin.${DEPLOYMENT_DOMAIN}
              namespacePrefix: service
              systemNamespace: ext-authz-token-exchange-e2e
              policy:
                httpbinResourceBase: https://httpbin.${DEPLOYMENT_DOMAIN}
              fakeTokenEndpoint:
                image: ${runtime.images.fake-token-endpoint.image}:${runtime.images.fake-token-endpoint.tag}
                env:
                  OTEL_TRACES_EXPORTER: otlp
                  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
                  OTEL_SERVICE_NAME: fake-token-endpoint
    patches:
      - op: replace
        path: pipelines.deploy.run
        value: |-
          source ./scripts/devspace-pipeline.sh
          devspace_pipeline_deploy
  - name: with-keycloak
    merge:
      deployments:
        ext-authz-token-exchange:
          helm:
            values:
              issuerProfiles:
                extraProfiles:
                  - name: local-keycloak
                    tokenEndpoint: http://keycloak.ext-authz-token-exchange-e2e.svc.cluster.local:8080/realms/token-exchange-e2e/protocol/openid-connect/token
                    bearerRealm: token-exchange-e2e
                    tokenEndpointAuthMethod: client_secret_basic
                    clientIDSecretRef:
                      name: ext-authz-token-exchange-keycloak-oauth
                      key: client_id
                    clientSecretSecretRef:
                      name: ext-authz-token-exchange-keycloak-oauth
                      key: client_secret
        ext-authz-token-exchange-e2e:
          namespace: ext-authz-token-exchange-e2e
          helm:
            releaseName: ext-authz-token-exchange-e2e
            chart:
              name: ./charts/ext-authz-token-exchange-e2e
            values:
              fakeTokenEndpoint:
                image: ${runtime.images.fake-token-endpoint.image}:${runtime.images.fake-token-endpoint.tag}
              additionalScenarios:
                - color: yellow
                  scenarios:
                    - name: keycloak-audience
                      scope: profile
                      pathPrefix: /anything/keycloak-audience
                      issuerRef: local-keycloak
                      resources: []
                      audiences:
                        - tx-audience-client
                    - name: keycloak-resource
                      scope: profile
                      pathPrefix: /anything/keycloak-resource
                      issuerRef: local-keycloak
                      resources:
                        - https://httpbin.${DEPLOYMENT_DOMAIN}/anything/keycloak-resource
                      audiences:
                        - tx-audience-client
                    - name: keycloak-expired-subject-token
                      scope: profile
                      pathPrefix: /anything/keycloak-expired-subject-token
                      issuerRef: local-keycloak
                      resources: []
                      audiences:
                        - tx-audience-client
                    - name: keycloak-unsigned-subject-token
                      scope: profile
                      pathPrefix: /anything/keycloak-unsigned-subject-token
                      issuerRef: local-keycloak
                      resources: []
                      audiences:
                        - tx-audience-client
                    - name: keycloak-truncated-signature
                      scope: profile
                      pathPrefix: /anything/keycloak-truncated-signature
                      issuerRef: local-keycloak
                      resources: []
                      audiences:
                        - tx-audience-client
                    - name: keycloak-untrusted-issuer
                      scope: profile
                      pathPrefix: /anything/keycloak-untrusted-issuer
                      issuerRef: local-keycloak
                      resources: []
                      audiences:
                        - tx-audience-client
                    - name: keycloak-invalid-audience
                      scope: profile
                      pathPrefix: /anything/keycloak-invalid-audience
                      issuerRef: local-keycloak
                      resources: []
                      audiences:
                        - tx-missing-audience-client
                    - name: keycloak-invalid-scope
                      scope: tx-missing-scope
                      pathPrefix: /anything/keycloak-invalid-scope
                      issuerRef: local-keycloak
                      resources: []
                      audiences:
                        - tx-audience-client
        keycloak:
          namespace: ext-authz-token-exchange-e2e
          helm:
            releaseName: keycloak
            chart:
              name: ./charts/keycloak
            values:
              gatewayProvider: ${GATEWAY_PROVIDER}
              gkeGatewayNamespace: ${GATEWAY_NAMESPACE}
              namespace: ext-authz-token-exchange-e2e
              pluginNamespace: ext-authz-token-exchange
              keycloak:
                externalHost: keycloak.${DEPLOYMENT_DOMAIN}
                externalURL: https://keycloak.${DEPLOYMENT_DOMAIN}
  - name: ext-proc
    merge:
      deployments:
        ext-authz-token-exchange:
          helm:
            values:
              extensionMode: ext_proc
              envoyFilter:
                enabled: true
              authorizationPolicy:
                enabled: false
              gatewayExtAuthzService:
                enabled: false
  - name: gke
    activation:
      - vars:
          DEVSPACE_CONTEXT: gke_.*
    merge:
      deployments:
        ext-authz-token-exchange:
          namespace: ${GATEWAY_NAMESPACE}
    patches:
      - op: add
        path: localRegistry
        value:
          enabled: false
      - op: replace
        path: deployments.ext-authz-token-exchange.namespace
        value: ${GATEWAY_NAMESPACE}
      - op: add
        path: images.prod.buildKit.args
        value:
          - --platform=linux/amd64
      - op: add
        path: images.fake-token-endpoint.buildKit.args
        value:
          - --platform=linux/amd64
      - op: replace
        path: images.prod.image
        value: ${REGISTRY}/${IMAGE_NAME}
      - op: replace
        path: images.fake-token-endpoint.image
        value: ${REGISTRY}/${FAKE_TOKEN_ENDPOINT_IMAGE_NAME}
  - name: gke-platform
    merge:
      deployments:
        ext-authz-token-exchange:
          namespace: ${GKE_GATEWAY_NAMESPACE}
          updateImageTags: false
          helm:
            values:
              image:
                repository: ghcr.io/michaelw/ext-authz-token-exchange
                tag: ${GKE_IMAGE_TAG}
              gatewayProvider: gke-gateway
              extensionMode: ext_proc
              gkeExtProc:
                name: ext-authz-token-exchange
                host: ${GKE_HTTPBIN_HOST}
                failOpen: false
                gateway:
                  name: ${GKE_GATEWAY_NAME}
              gkeAuthz:
                callout:
                  service:
                    name: gateway-ext-authz
                    port: 3000
                    targetPort: grpc-authz-tls
                    appProtocol: HTTP2
                  tls:
                    enabled: true
                    port: 3000
                    secretName: gateway-ext-authz-tls
                    selfSigned:
                      enabled: true
                    backendTLSPolicy:
                      enabled: false
                    certificate:
                      enabled: false
                      dnsNames:
                        - gateway-ext-authz.${GKE_GATEWAY_NAMESPACE}.svc.cluster.local
                  healthCheck:
                    enabled: true
                    port: 3001
                    portSpecification: USE_FIXED_PORT
                  backendPolicy:
                    enabled: false
              oauth:
                createSecret: true
                secretName: ext-authz-token-exchange-fake-issuer-oauth
                clientID: e2e-client
                clientSecret: e2e-secret
                existingSecret:
                  name: ext-authz-token-exchange-fake-issuer-oauth
                  clientIDKey: client_id
                  clientSecretKey: client_secret
              issuerProfiles:
                profiles:
                  - name: fake-issuer
                    tokenEndpoint: http://fake-token-endpoint.${GKE_PLATFORM_NAMESPACE}.svc.cluster.local:8080/token/success
                    bearerRealm: ext-authz-token-exchange-e2e
                    tokenEndpointAuthMethod: client_secret_basic
                    clientIDSecretRef:
                      name: ext-authz-token-exchange-fake-issuer-oauth
                      key: client_id
                    clientSecretSecretRef:
                      name: ext-authz-token-exchange-fake-issuer-oauth
                      key: client_secret
                  - name: local-keycloak
                    tokenEndpoint: http://keycloak.${GKE_PLATFORM_NAMESPACE}.svc.cluster.local:8080/realms/token-exchange-e2e/protocol/openid-connect/token
                    bearerRealm: token-exchange-e2e
                    tokenEndpointAuthMethod: client_secret_basic
                    clientIDSecretRef:
                      name: ext-authz-token-exchange-keycloak-oauth
                      key: client_id
                    clientSecretSecretRef:
                      name: ext-authz-token-exchange-keycloak-oauth
                      key: client_secret
              env:
                TOKEN_EXCHANGE_ALLOW_HTTP_TOKEN_ENDPOINT: "true"
                TOKEN_EXCHANGE_BEARER_REALM: ext-authz-token-exchange-e2e
                TOKEN_EXCHANGE_INSECURE_LOG_TOKENS: "false"
                TOKEN_EXCHANGE_DEFAULT_DENY_UNMATCHED: "false"
                GRPC_LOG_HEALTH_CHECKS: "false"
                OTEL_TRACES_EXPORTER: none
                OTEL_METRICS_EXPORTER: none
        gke-platform-resources:
          namespace: ${GKE_PLATFORM_NAMESPACE}
          helm:
            releaseName: txe-platform
            chart:
              name: ./charts/ext-authz-token-exchange-e2e
            values:
              gatewayProvider: gke-gateway
              host: ${GKE_HTTPBIN_HOST}
              namespacePrefix: ${GKE_TEAM_NAMESPACE_PREFIX}
              systemNamespace: ${GKE_PLATFORM_NAMESPACE}
              policy:
                httpbinResourceBase: ${GKE_EXTERNAL_SCHEME}://${GKE_HTTPBIN_HOST}
              fakeTokenEndpoint:
                enabled: true
                image: ghcr.io/michaelw/ext-authz-token-exchange-fake-token-endpoint:${GKE_IMAGE_TAG}
                routes:
                  - name: yellow-success
                    match:
                      audience: httpbin-yellow
                    response:
                      type: success
                      scenario: yellow
                  - name: red-success
                    match:
                      audience: httpbin-red
                    response:
                      type: success
                      scenario: red
                  - name: blue-success
                    match:
                      audience: httpbin-blue
                    response:
                      type: success
                      scenario: blue
                  - name: green-success
                    match:
                      audience: httpbin-green
                    response:
                      type: success
                      scenario: green
              teamApp:
                enabled: false
              platformRoutes:
                enabled: true
                gatewayNamespace: ${GKE_GATEWAY_NAMESPACE}
                gatewayName: ${GKE_GATEWAY_NAME}
                gatewaySectionName: ${GKE_GATEWAY_SECTION_NAME}
                host: ${GKE_HTTPBIN_HOST}
                teamNames: ${GKE_PLATFORM_TEAMS}
                teamNamespacePrefix: ${GKE_TEAM_NAMESPACE_PREFIX}
                teamPathRoot: ${GKE_TEAM_PATH_ROOT}
              teams: []
        gke-platform-keycloak:
          namespace: ${GKE_PLATFORM_NAMESPACE}
          helm:
            releaseName: keycloak
            chart:
              name: ./charts/keycloak
            values:
              gatewayProvider: gke-gateway
              gkeGatewayNamespace: ${GKE_GATEWAY_NAMESPACE}
              namespace: ${GKE_PLATFORM_NAMESPACE}
              pluginNamespace: ${GKE_GATEWAY_NAMESPACE}
              keycloak:
                externalHost: ${GKE_KEYCLOAK_HOST}
                externalURL: ${GKE_EXTERNAL_SCHEME}://${GKE_KEYCLOAK_HOST}
              gateway:
                name: ${GKE_GATEWAY_NAME}
                sectionName: ${GKE_GATEWAY_SECTION_NAME}
                routeNamespace: ${GKE_GATEWAY_NAMESPACE}
                createReferenceGrant: true
                httpRedirect:
                  forceDisabled: true
              gkeIap:
                forceDisabled: true
        gke-platform-yellow:
          namespace: ${GKE_TEAM_NAMESPACE_PREFIX}-yellow
          helm:
            releaseName: txe-team-yellow
            chart:
              name: ./charts/ext-authz-token-exchange-e2e
            values:
              gatewayProvider: gke-gateway
              host: ${GKE_HTTPBIN_HOST}
              namespacePrefix: ${GKE_TEAM_NAMESPACE_PREFIX}
              systemNamespace: ${GKE_PLATFORM_NAMESPACE}
              policy:
                httpbinResourceBase: ${GKE_EXTERNAL_SCHEME}://${GKE_HTTPBIN_HOST}
              fakeTokenEndpoint:
                enabled: false
              teamApp:
                enabled: true
                gatewayNamespace: ${GKE_GATEWAY_NAMESPACE}
              platformRoutes:
                enabled: false
              teams:
                - color: yellow
                  namespace: ${GKE_TEAM_NAMESPACE_PREFIX}-yellow
                  scope: yellow
                  pathPrefix: "${GKE_TEAM_PATH_ROOT}/yellow"
                  audiences: ["httpbin-yellow"]
                  scenarios:
                    - name: keycloak-audience
                      scope: profile
                      pathPrefix: "${GKE_TEAM_PATH_ROOT}/yellow/keycloak"
                      issuerRef: local-keycloak
                      resources: []
                      audiences: ["tx-audience-client"]
    patches:
      - op: remove
        path: deployments.ext-authz-token-exchange-e2e
      - op: replace
        path: pipelines.deploy.run
        value: |-
          source ./scripts/devspace-pipeline.sh
          devspace_pipeline_deploy_gke_platform
  - name: gke-app
    merge:
      deployments:
        gke-team-app:
          namespace: ${GKE_TEAM_NAMESPACE}
          helm:
            releaseName: txe-team-${GKE_TEAM_NAME}
            chart:
              name: ./charts/ext-authz-token-exchange-e2e
            values:
              gatewayProvider: gke-gateway
              host: ${GKE_HTTPBIN_HOST}
              namespacePrefix: ${GKE_TEAM_NAMESPACE_PREFIX}
              systemNamespace: ${GKE_PLATFORM_NAMESPACE}
              policy:
                httpbinResourceBase: ${GKE_EXTERNAL_SCHEME}://${GKE_HTTPBIN_HOST}
              fakeTokenEndpoint:
                enabled: false
              teamApp:
                enabled: true
                gatewayNamespace: ${GKE_GATEWAY_NAMESPACE}
              platformRoutes:
                enabled: false
              teams:
                - color: ${GKE_TEAM_NAME}
                  namespace: ${GKE_TEAM_NAMESPACE}
                  scope: ${GKE_TEAM_NAME}
                  pathPrefix: "${GKE_TEAM_PATH_ROOT}/${GKE_TEAM_NAME}"
                  audiences: ["httpbin-${GKE_TEAM_NAME}"]
                  scenarios:
                    - name: keycloak-audience
                      scope: profile
                      pathPrefix: "${GKE_TEAM_PATH_ROOT}/${GKE_TEAM_NAME}/keycloak"
                      issuerRef: local-keycloak
                      resources: []
                      audiences: ["tx-audience-client"]
    patches:
      - op: remove
        path: deployments.ext-authz-token-exchange
      - op: remove
        path: deployments.ext-authz-token-exchange-e2e
      - op: replace
        path: pipelines.deploy.run
        value: |-
          source ./scripts/devspace-pipeline.sh
          devspace_pipeline_deploy_gke_app
# Images to build and push
images:
  # Development image - not pushed to production registry
  dev:
    image: ${DEV_REGISTRY}/${IMAGE_NAME}-dev
    dockerfile: ./Dockerfile
    target: dev
    buildKit: &buildKit
      {}
    tags:
      - ${DEV_TAG}
      - dev
    skipPush: true # Never push dev images to registry

  # Production image - for deployment and dependencies
  prod:
    image: ${REGISTRY}/${IMAGE_NAME}
    dockerfile: ./Dockerfile
    target: prod
    buildKit: *buildKit
    tags:
      - "${IMAGE_TAG}"
      - ${PROD_TAG}
    # This will be pushed to registry for others to use

  fake-token-endpoint:
    image: ${REGISTRY}/${FAKE_TOKEN_ENDPOINT_IMAGE_NAME}
    dockerfile: ./Dockerfile
    target: fake-token-endpoint
    buildKit: *buildKit
    tags:
      - "${IMAGE_TAG}"
      - ${PROD_TAG}

# Deployments - Kubernetes manifests
deployments:
  ext-authz-token-exchange:
    namespace: ext-authz-token-exchange
    updateImageTags: false
    helm:
      releaseName: ext-authz-token-exchange
      chart:
        name: ./charts/ext-authz-token-exchange
      values:
        image:
          repository: ${runtime.images.prod.image}
          tag: ${runtime.images.prod.tag}
        env:
          GRPC_LOG_HEALTH_CHECKS: "false"
          OTEL_TRACES_EXPORTER: otlp
          OTEL_METRICS_EXPORTER: otlp
          OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
          OTEL_SERVICE_NAME: ext-authz-token-exchange
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi

# Development configuration
dev:
  ext-authz-token-exchange:
    imageSelector: ${REGISTRY}/${IMAGE_NAME}
    devImage: ${DEV_REGISTRY}/${IMAGE_NAME}-dev

    env: []

    resources:
      requests:
        cpu: 1000m
        memory: 1024Mi

    # Patch Kubernetes resources last-mile
    patches:
      # Override security context for development
      - op: add
        path: spec.containers[*].securityContext.allowPrivilegeEscalation
        value: true

    # Sync local files to container
    sync:
      - path: ./
        startContainer: true
      - path: "${DEVSPACE_USER_HOME}/.gitconfig:${CONTAINER_USER_HOME}/.gitconfig"
        file: true
        disableDownload: true

    # Port forwarding for development
    ports:
      - port: "3001" # gRPC ext-authz service

    persistPaths:
    - path: /go-cache
      skipPopulate: true
      # Optional path on the persistent volume to mount
      # volumePath: my-volume/app

    ssh:
      localHostname: ${DEVSPACE_NAME}.devspace

    proxyCommands:
      - gitCredentials: true
      - command: kubectl

    workingDir: /workspaces/${DEVSPACE_NAME}

    terminal:
      command: bash .devcontainer/start.sh

    command: ["/entrypoint.sh"]
    args: ["air"]

    restartHelper:
      inject: true

pipelines:
  # Pipeline for development
  dev:
    flags:
    - name: logs
      short: l
    - name: vscode
    run: |-
      LOGS_ENABLED=false
      TERMINAL_ENABLED=true
      if [ $(get_flag "logs") == "true" ]; then
        LOGS_ENABLED=true
        TERMINAL_ENABLED=false
      fi

      run_dependencies --all
      ensure_pull_secrets --all
      build_images dev
      create_deployments --all
      start_dev --all --set "terminal.enabled=$TERMINAL_ENABLED" --set "logs.enabled=$LOGS_ENABLED"
      if [ $(get_flag "vscode") == "true" ]; then
        code --folder-uri vscode-remote://ssh-remote+${DEVSPACE_NAME}.devspace/workspaces/${DEVSPACE_NAME}
      fi

  # Pipeline for regular deployment
  deploy:
    run: |-
      run_dependencies --all
      ensure_pull_secrets --all
      build_images prod
      helm dependency build charts/ext-authz-token-exchange
      create_deployments --all

commands:
  # sections:
  #   build:
  #     Commands that can be executed in a dev container
  #   images:
  #     Commands related to building and pushing Docker images
  #   deploy:
  #     Commands related to deploying the service to Kubernetes
  setup:
    description: "Setup the development environment"
    section: build
    command: |
      echo "I: target=setup"
      go install github.com/go-delve/delve/cmd/dlv@v1.26.3
      go install github.com/air-verse/air@v1.65.1

  generate:
    description: "Generate required code and download dependencies"
    section: build
    command: |
      echo "I: target=generate"
      go mod download

  compile:
    description: "Compile the code base"
    section: build
    command: |
      echo "I: target=compile"
      go mod download
      go build -v ./cmd/...

  build:
    description: "Build all commands"
    section: build
    command: |
      echo "I: target=build"
      go mod download
      go build ./cmd/...

  test:
    description: "Run all tests"
    section: build
    command: |
      echo "I: target=test"
      go mod download
      go build ./cmd/...
      go test -v ./...

  coverage:
    description: "Run Go tests with coverage"
    section: build
    command: |
      echo "I: target=coverage"
      go test -coverprofile=coverage.out ./...

  actionlint:
    description: "Lint GitHub Actions workflows"
    section: build
    command: |
      echo "I: target=actionlint"
      go run github.com/rhysd/actionlint/cmd/actionlint@latest

  lint:
    description: "Run repository lint checks"
    section: build
    command: |
      echo "I: target=lint"
      pre-commit run --all-files
      go run github.com/rhysd/actionlint/cmd/actionlint@latest

  helm-verify:
    description: "Verify Helm chart dependencies, lint, and rendering"
    section: build
    command: |
      echo "I: target=helm-verify"
      helm dependency build charts/ext-authz-token-exchange
      helm dependency build charts/keycloak
      helm lint charts/ext-authz-token-exchange
      helm lint charts/ext-authz-token-exchange-e2e
      helm lint charts/keycloak
      helm template ext-authz-token-exchange charts/ext-authz-token-exchange \
        --namespace ext-authz-token-exchange \
        > /tmp/ext-authz-token-exchange-rendered.yaml
      helm template ext-authz-token-exchange-e2e charts/ext-authz-token-exchange-e2e \
        --namespace ext-authz-token-exchange-e2e \
        > /tmp/ext-authz-token-exchange-e2e-rendered.yaml
      ./scripts/verify-gke-deployment-model.sh

  verify:
    description: "Run CI-equivalent local validation without a Kubernetes cluster"
    section: build
    command: |
      echo "I: target=verify"
      echo "I: target=lint"
      pre-commit run --all-files
      go run github.com/rhysd/actionlint/cmd/actionlint@latest
      echo "I: target=test"
      go mod download
      go build ./cmd/...
      go test -v ./...
      echo "I: target=coverage"
      go test -coverprofile=coverage.out ./...
      echo "I: target=build"
      go mod download
      go build ./cmd/...
      echo "I: target=helm-verify"
      helm dependency build charts/ext-authz-token-exchange
      helm dependency build charts/keycloak
      helm lint charts/ext-authz-token-exchange
      helm lint charts/ext-authz-token-exchange-e2e
      helm lint charts/keycloak
      helm template ext-authz-token-exchange charts/ext-authz-token-exchange \
        --namespace ext-authz-token-exchange \
        > /tmp/ext-authz-token-exchange-rendered.yaml
      helm template ext-authz-token-exchange-e2e charts/ext-authz-token-exchange-e2e \
        --namespace ext-authz-token-exchange-e2e \
        > /tmp/ext-authz-token-exchange-e2e-rendered.yaml
      ./scripts/verify-gke-deployment-model.sh

  smoke:
    description: "Deploy the selected provider test stack and run Kubernetes e2e smoke tests"
    section: build
    command: |
      echo "I: target=smoke"
      devspace deploy
      E2E_BASE_URL="https://httpbin.$DEPLOYMENT_DOMAIN" devspace run test-e2e $@

  test-e2e:
    description: "Run Kubernetes e2e tests against the selected test stack"
    section: build
    command: |
      echo "I: target=test-e2e"
      LABEL_FILTER_ARGS=""
      case " $* " in
        *"--label-filter"*) ;;
        *) LABEL_FILTER_ARGS="--label-filter=!stress" ;;
      esac
      if [ "${DEVSPACE_CONTEXT#gke_}" != "$DEVSPACE_CONTEXT" ] && [ -z "${E2E_NAMESPACE:-}" ]; then
        E2E_NAMESPACE="${GATEWAY_NAMESPACE}"
        export E2E_NAMESPACE
      fi
      KEYCLOAK_PORT_FORWARD_PID=""
      if [ -z "${E2E_KEYCLOAK_BASE_URL:-}" ] && [ "${DEVSPACE_CONTEXT#gke_}" = "$DEVSPACE_CONTEXT" ] && kubectl -n ext-authz-token-exchange-e2e get svc keycloak >/dev/null 2>&1; then
        E2E_KEYCLOAK_BASE_URL="https://keycloak.$DEPLOYMENT_DOMAIN"
        E2E_KEYCLOAK_ISSUER="${E2E_KEYCLOAK_ISSUER:-${E2E_KEYCLOAK_BASE_URL}/realms/token-exchange-e2e}"
        export E2E_KEYCLOAK_BASE_URL E2E_KEYCLOAK_ISSUER
        echo "I: using Keycloak route at ${E2E_KEYCLOAK_BASE_URL}"
      fi
      if [ -z "${E2E_KEYCLOAK_BASE_URL:-}" ] && [ "${DEVSPACE_CONTEXT#gke_}" != "$DEVSPACE_CONTEXT" ] && kubectl -n ext-authz-token-exchange-e2e get svc keycloak >/dev/null 2>&1; then
        for port in 18080 18081 18082 18083 18084 18085 18086 18087 18088 18089; do
          if ! nc -z 127.0.0.1 "$port" >/dev/null 2>&1; then
            KEYCLOAK_PORT="$port"
            break
          fi
        done
        if [ -z "${KEYCLOAK_PORT:-}" ]; then
          echo "E: no free local Keycloak port found in 18080-18089" >&2
          exit 1
        fi
        KEYCLOAK_PORT_FORWARD_LOG="/tmp/ext-authz-token-exchange-keycloak-port-forward.log"
        kubectl -n ext-authz-token-exchange-e2e port-forward --address 127.0.0.1 svc/keycloak "${KEYCLOAK_PORT}:8080" >"$KEYCLOAK_PORT_FORWARD_LOG" 2>&1 &
        KEYCLOAK_PORT_FORWARD_PID="$!"
        trap 'if [ -n "${KEYCLOAK_PORT_FORWARD_PID:-}" ]; then kill "$KEYCLOAK_PORT_FORWARD_PID" >/dev/null 2>&1 || true; fi' EXIT
        KEYCLOAK_READY=false
        for _ in $(seq 1 60); do
          if curl -fsS "http://127.0.0.1:${KEYCLOAK_PORT}/realms/token-exchange-e2e" >/dev/null 2>&1; then
            KEYCLOAK_READY=true
            break
          fi
          sleep 1
        done
        if [ "$KEYCLOAK_READY" != "true" ]; then
          echo "E: Keycloak port-forward did not become ready; log follows:" >&2
          cat "$KEYCLOAK_PORT_FORWARD_LOG" >&2
          exit 1
        fi
        E2E_KEYCLOAK_BASE_URL="http://127.0.0.1:${KEYCLOAK_PORT}"
        E2E_KEYCLOAK_ISSUER="${E2E_KEYCLOAK_ISSUER:-https://keycloak.$DEPLOYMENT_DOMAIN/realms/token-exchange-e2e}"
        export E2E_KEYCLOAK_BASE_URL E2E_KEYCLOAK_ISSUER
      fi
      E2E_BASE_URL="${E2E_BASE_URL:-https://httpbin.$DEPLOYMENT_DOMAIN}" \
      E2E_SKIP_INSTALL="${E2E_SKIP_INSTALL:-true}" \
      go run github.com/onsi/ginkgo/v2/ginkgo -r $LABEL_FILTER_ARGS "$@" ./test/e2e

  gke-smoke:
    description: "Deploy the GKE test stack and run Kubernetes e2e smoke tests"
    section: build
    command: |
      echo "I: target=gke-smoke"
      devspace run smoke $@

  stress-e2e:
    description: "Deploy the selected provider test stack and run the small opt-in Kubernetes e2e stress test"
    section: build
    command: |
      echo "I: target=stress-e2e"
      devspace deploy
      devspace run test-e2e --label-filter=stress "$@"

  demo-dashboard:
    description: "Start the local token exchange demo dashboard"
    section: build
    command: |
      echo "I: target=demo-dashboard"
      DEMO_PLUGIN_NAMESPACE="ext-authz-token-exchange"
      if [ "$GATEWAY_PROVIDER" = "gke-gateway" ]; then
        DEMO_PLUGIN_NAMESPACE="$GATEWAY_NAMESPACE"
      fi
      KEYCLOAK_PORT_FORWARD_PID=""
      if [ -z "${DEMO_KEYCLOAK_BASE_URL:-}" ] && [ "${DEVSPACE_CONTEXT#gke_}" != "$DEVSPACE_CONTEXT" ] && kubectl -n ext-authz-token-exchange-e2e get svc keycloak >/dev/null 2>&1; then
        for port in 18080 18081 18082 18083 18084 18085 18086 18087 18088 18089; do
          if ! nc -z 127.0.0.1 "$port" >/dev/null 2>&1; then
            KEYCLOAK_PORT="$port"
            break
          fi
        done
        if [ -z "${KEYCLOAK_PORT:-}" ]; then
          echo "E: no free local Keycloak port found in 18080-18089" >&2
          exit 1
        fi
        KEYCLOAK_PORT_FORWARD_LOG="/tmp/ext-authz-token-exchange-demo-keycloak-port-forward.log"
        kubectl -n ext-authz-token-exchange-e2e port-forward --address 127.0.0.1 svc/keycloak "${KEYCLOAK_PORT}:8080" >"$KEYCLOAK_PORT_FORWARD_LOG" 2>&1 &
        KEYCLOAK_PORT_FORWARD_PID="$!"
        trap 'if [ -n "${KEYCLOAK_PORT_FORWARD_PID:-}" ]; then kill "$KEYCLOAK_PORT_FORWARD_PID" >/dev/null 2>&1 || true; fi' EXIT
        KEYCLOAK_READY=false
        for _ in $(seq 1 60); do
          if curl -fsS "http://127.0.0.1:${KEYCLOAK_PORT}/realms/token-exchange-e2e" >/dev/null 2>&1; then
            KEYCLOAK_READY=true
            break
          fi
          sleep 1
        done
        if [ "$KEYCLOAK_READY" != "true" ]; then
          echo "E: Keycloak port-forward did not become ready; log follows:" >&2
          cat "$KEYCLOAK_PORT_FORWARD_LOG" >&2
          exit 1
        fi
        DEMO_KEYCLOAK_BASE_URL="http://127.0.0.1:${KEYCLOAK_PORT}"
        export DEMO_KEYCLOAK_BASE_URL
        echo "I: using local Keycloak port-forward at ${DEMO_KEYCLOAK_BASE_URL}"
      fi
      DEMO_BASE_URL="${DEMO_BASE_URL:-https://httpbin.$DEPLOYMENT_DOMAIN}" \
      DEMO_KEYCLOAK_BASE_URL="${DEMO_KEYCLOAK_BASE_URL:-https://keycloak.$DEPLOYMENT_DOMAIN}" \
      DEMO_KEYCLOAK_ISSUER="${DEMO_KEYCLOAK_ISSUER:-https://keycloak.$DEPLOYMENT_DOMAIN/realms/token-exchange-e2e}" \
      DEMO_PLUGIN_NAMESPACE="${DEMO_PLUGIN_NAMESPACE}" \
        go run ./cmd/demo-dashboard $@

  start:
    description: "Start the application"
    section: build
    command: |
      echo "I: target=start"
      if ! pgrep air >/dev/null; then
        go run ./cmd/ext-authz-token-exchange-service $@
      else
        echo "I: using air, nothing to do here"
      fi

  build-images:
    description: "Build Docker images for development and production environments"
    section: images
    command: |
      devspace build $@

  deploy:
    description: "Deploy the service to Kubernetes"
    section: deploy
    command: |
      devspace deploy $@

  dev:
    description: "Start development environment"
    section: deploy
    command: |
      devspace dev $@

  helm:
    description: "Run Helm commands"
    section: deploy
    command: |
      helm $@

  k:
    description: "Run kubectl commands"
    section: deploy
    command: |
      kubectl $@

  k9s:
    description: "Run k9s, the Kubernetes terminal UI"
    section: deploy
    command: |
      k9s $@

  logs:
    description: "View logs from the deployed service pods"
    section: deploy
    command: |
      devspace logs $@
