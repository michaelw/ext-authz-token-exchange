{{- if .Values.fakeTokenEndpoint.routes }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ext-authz-token-exchange-e2e.fakeTokenEndpointConfigMapName" . | quote }}
  namespace: {{ .Values.systemNamespace | quote }}
  labels:
{{ include "ext-authz-token-exchange-e2e.labels" . | indent 4 }}
    app.kubernetes.io/name: {{ .Values.fakeTokenEndpoint.name | quote }}
data:
  config.yaml: |
    routes:
{{ toYaml .Values.fakeTokenEndpoint.routes | indent 6 }}
{{- with .Values.fakeTokenEndpoint.defaultResponse }}
    defaultResponse:
{{ toYaml . | indent 6 }}
{{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.fakeTokenEndpoint.name | quote }}
  namespace: {{ .Values.systemNamespace | quote }}
  labels:
{{ include "ext-authz-token-exchange-e2e.labels" . | indent 4 }}
    app.kubernetes.io/name: {{ .Values.fakeTokenEndpoint.name | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.fakeTokenEndpoint.name | quote }}
  template:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
      labels:
{{ include "ext-authz-token-exchange-e2e.labels" . | indent 8 }}
        app.kubernetes.io/name: {{ .Values.fakeTokenEndpoint.name | quote }}
    spec:
      containers:
        - name: {{ .Values.fakeTokenEndpoint.name | quote }}
          image: {{ .Values.fakeTokenEndpoint.image | quote }}
          imagePullPolicy: {{ .Values.fakeTokenEndpoint.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.fakeTokenEndpoint.port }}
{{- if or .Values.fakeTokenEndpoint.routes .Values.fakeTokenEndpoint.env }}
          env:
{{- if .Values.fakeTokenEndpoint.routes }}
            - name: "FAKE_TOKEN_ENDPOINT_CONFIG"
              value: "/etc/fake-token-endpoint/config.yaml"
{{- end }}
{{- with .Values.fakeTokenEndpoint.env }}
{{- range $name, $value := . }}
            - name: {{ $name | quote }}
              value: {{ $value | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.fakeTokenEndpoint.routes }}
          volumeMounts:
            - name: config
              mountPath: /etc/fake-token-endpoint
              readOnly: true
{{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
{{ toYaml .Values.fakeTokenEndpoint.resources | indent 12 }}
{{- if .Values.fakeTokenEndpoint.routes }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ext-authz-token-exchange-e2e.fakeTokenEndpointConfigMapName" . | quote }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.fakeTokenEndpoint.name | quote }}
  namespace: {{ .Values.systemNamespace | quote }}
  labels:
{{ include "ext-authz-token-exchange-e2e.labels" . | indent 4 }}
    app.kubernetes.io/name: {{ .Values.fakeTokenEndpoint.name | quote }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Values.fakeTokenEndpoint.name | quote }}
  ports:
    - name: http
      port: {{ .Values.fakeTokenEndpoint.port }}
      targetPort: http
