image:
  repository: ghcr.io/michaelw/ext-authz-token-exchange
  # set by Chart.yaml appVersion
  # tag: latest
  # use locally built images if available
  pullPolicy: IfNotPresent

gatewayProvider: local-istio

extensionMode: ext_authz

deployments:
  default:
    enabled: true

deploymentAnnotations:
  reloader.stakater.com/auto: "true"

serviceAccountName: ext-authz-token-exchange

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

ports:
  grpc-authz-tls:
    enabled: false
    containerPort: 3000
  grpc-authz:
    containerPort: 3001
  http-metrics:
    containerPort: 3002

livenessProbe:
  grpc:
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  grpc:
    port: 3001
  initialDelaySeconds: 1
  periodSeconds: 2
  failureThreshold: 3

resources:
  requests:
    cpu: 200m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

service:
  type: ClusterIP
  ports:
    grpc-api:
      port: 3001
      targetPort: grpc-authz
      appProtocol: grpc
    http-metrics:
      port: 3002
      targetPort: http-metrics
      appProtocol: http

gkeAuthz:
  enabled: false
  gateway:
    name: gateway
    namespace: gke-gateway
    sectionName: https
  host: httpbin.gcp.kube
  callout:
    service:
      name: gateway-ext-authz
      port: 3000
      targetPort: grpc-authz-tls
      appProtocol: HTTP2
    tls:
      enabled: true
      port: 3000
      secretName: gateway-ext-authz-tls
      mountPath: /etc/ext-authz-token-exchange/tls
      certificate:
        enabled: true
        issuerName: gateway-ext-authz-selfsigned
        issuerKind: Issuer
        dnsNames:
          - gateway-ext-authz.ext-authz-token-exchange.svc.cluster.local
    healthCheck:
      enabled: true
      port: 3001
      portSpecification: USE_FIXED_PORT
      checkIntervalSec: 5
      timeoutSec: 3
      healthyThreshold: 1
      unhealthyThreshold: 2
      logConfig:
        enabled: true
    backendPolicy:
      enabled: true
      connectionDraining:
        drainingTimeoutSec: 30

gkeExtProc:
  enabled: false
  name: ext-authz-token-exchange
  chainName: token-exchange
  extensionName: token-exchange
  timeout: 1s
  failOpen: false
  host: httpbin.gcp.kube
  gateway:
    name: gateway
  supportedEvents:
    - RequestHeaders
  # Omit forwardHeaders and forwardAttributes on current GKE Gateway CRDs.
  # Live validation on GKE 1.35.3-gke.2190000 showed that omitting
  # forwardHeaders forwards all headers, including :method, :scheme,
  # :authority, and :path. Uncomment explicit forwarding only after:
  #   kubectl explain gcptrafficextension.spec.extensionChains.extensions --recursive
  # shows forwardAttributes.
  # forwardHeaders:
  #   - authorization
  #   - cookie
  #   - origin
  #   - access-control-request-method
  #   - access-control-request-headers
  #   - x-request-id
  #   - traceparent
  #   - tracestate
  #   - cf-connecting-ip
  #   - cf-connecting-ipv6
  #   - cf-ipcountry
  #   - cf-pseudo-ipv4
  #   - cf-ray
  #   - cf-visitor
  #   - cf-worker
  #   - cdn-loop
  #   - true-client-ip
  #   - x-forwarded-for
  #   - x-forwarded-proto
  # forwardAttributes:
  #   - request.method
  #   - request.scheme
  #   - request.host
  #   - request.path
  #   - request.query

oauth:
  createSecret: false
  secretName: ext-authz-token-exchange-oauth
  clientID: ""
  clientSecret: ""
  existingSecret:
    name: ext-authz-token-exchange-oauth
    clientIDKey: client_id
    clientSecretKey: client_secret

issuerProfiles:
  configMapName: ""
  mountPath: /etc/ext-authz-token-exchange
  fileName: issuers.yaml
  profiles: []
  extraProfiles: []

env:
  GRPC_LOG_HEALTH_CHECKS: "true"
  METRICS_ENABLED: "false"
  METRICS_PATH: /metrics
  METRICS_PORT: "3002"
  TOKEN_EXCHANGE_DEFAULT_DENY_UNMATCHED: "false"
  # CONFIGMAP_LABEL_SELECTOR: ext-authz-token-exchange.magneticflux.net/enabled=true
  # CONFIGMAP_NAMESPACE_SELECTOR: ext-authz-token-exchange.magneticflux.net/policy=enabled
  # GRPC_PORT: "3001"
  # TOKEN_ENDPOINT_AUTH_METHOD: client_secret_basic
  # TOKEN_ENDPOINT_DIAL_TIMEOUT: 3s
  # TOKEN_ENDPOINT_IDLE_CONN_TIMEOUT: 90s
  # TOKEN_ENDPOINT_MAX_IDLE_CONNS: "100"
  # TOKEN_ENDPOINT_MAX_IDLE_CONNS_PER_HOST: "10"
  # METRICS_ENABLED: "false"
  # METRICS_PATH: /metrics
  # METRICS_PORT: "3002"
  # TOKEN_ENDPOINT_REQUEST_TIMEOUT: 750ms
  # TOKEN_ENDPOINT_RESPONSE_HEADER_TIMEOUT: 500ms
  # TOKEN_ENDPOINT_TLS_HANDSHAKE_TIMEOUT: 3s
  # TOKEN_EXCHANGE_ALLOW_HTTP_TOKEN_ENDPOINT: "false"
  # TOKEN_EXCHANGE_ALLOW_UNAUTHENTICATED_OPTIONS: "false"
  # TOKEN_EXCHANGE_BEARER_REALM: ext-authz-token-exchange
  # TOKEN_EXCHANGE_ISSUER_PROFILES_FILE: /etc/ext-authz-token-exchange/issuers.yaml
  # TOKEN_EXCHANGE_ERROR_PASSTHROUGH: "false"
  # TOKEN_EXCHANGE_EXPECTED_ISSUED_TOKEN_TYPE: urn:ietf:params:oauth:token-type:access_token
  # TOKEN_EXCHANGE_GRANT_TYPE: urn:ietf:params:oauth:grant-type:token-exchange
  # TOKEN_EXCHANGE_INSECURE_LOG_TOKENS: "false"
  # TOKEN_EXCHANGE_REQUIRE_ISSUED_TOKEN_TYPE: "true"
  # TOKEN_EXCHANGE_SUBJECT_TOKEN_TYPE: urn:ietf:params:oauth:token-type:access_token
  # OTEL_TRACES_EXPORTER: otlp
  # OTEL_METRICS_EXPORTER: otlp
  # OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability.svc.cluster.local:4317
  # OTEL_SERVICE_NAME: ext-authz-token-exchange
  # OTEL_RESOURCE_ATTRIBUTES: deployment.environment=local
  # OTEL_SDK_DISABLED: "false"

rbac:
  create: true
  serviceAccountName: ext-authz-token-exchange
  clusterRoleName: ""
  clusterRoleBindingName: ""

envoyFilter:
  enabled: false
  namespace: istio-ingress
  workloadSelectorLabels:
    gateway.networking.k8s.io/gateway-name: gateway
  workloadSelectorLabelsOverride: {}
  timeout: 1s
  extProc:
    failureModeAllow: false
    clearRouteCache: true

authorizationPolicy:
  enabled: false
  namespace: istio-ingress
  providerName: gateway-ext-authz-grpc
  workloadSelectorLabels:
    gateway.networking.k8s.io/gateway-name: gateway
  workloadSelectorLabelsOverride: {}
  rules:
    - {}

gatewayExtAuthzService:
  enabled: false
  namespace: istio-ingress
  name: gateway-ext-authz
  # A Kubernetes Service is rendered only when serviceEntry.enabled=false.
  type: ExternalName
  # Defaults to the plugin Service FQDN when empty.
  externalName: ""
  port: 3001
  targetPort: 3001
  appProtocol: grpc
  serviceEntry:
    enabled: true
    location: MESH_INTERNAL
    resolution: DNS
    protocol: GRPC

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

grafanaDashboard:
  enabled: false
  name: ext-authz-token-exchange-red-dashboard
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: Ext AuthZ
  datasourceUid: prometheus
  pluginJob: ext-authz-token-exchange
  gatewayJob: observability/istio-gateway-api-gateway
  gatewayWorkload: gateway-istio
  # Environment-specific Envoy cluster name for the ext-authz provider backend.
  providerCluster: ""
  envoyTimeoutMs: 1000
  tokenEndpointTimeoutSeconds: 0.75
