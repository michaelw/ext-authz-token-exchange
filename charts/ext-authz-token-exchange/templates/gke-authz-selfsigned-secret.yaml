{{- if and (eq (include "ext-authz-token-exchange.gkeCalloutEnabled" .) "true") .Values.gkeAuthz.callout.tls.enabled .Values.gkeAuthz.callout.tls.selfSigned.enabled }}
{{- $secretName := .Values.gkeAuthz.callout.tls.secretName }}
{{- $dnsName := required "gkeAuthz.callout.tls.certificate.dnsNames must contain the callout Service hostname when selfSigned.enabled=true" (first .Values.gkeAuthz.callout.tls.certificate.dnsNames) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $data := dict }}
{{- if $existing }}
{{- $data = $existing.data }}
{{- else }}
{{- $certificate := genSelfSignedCert $dnsName nil (list $dnsName) (int .Values.gkeAuthz.callout.tls.selfSigned.validityDays) }}
{{- $_ := set $data "tls.crt" ($certificate.Cert | b64enc) }}
{{- $_ := set $data "tls.key" ($certificate.Key | b64enc) }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
{{ include "ext-authz-token-exchange.labels" . | indent 4 }}
type: kubernetes.io/tls
data:
{{ toYaml $data | indent 2 }}
{{- end }}
