{{- if .Values.oauth.createSecret }}
{{- if not .Values.oauth.secretName }}
{{- fail "oauth.secretName is required when oauth.createSecret=true" }}
{{- end }}
{{- if not .Values.oauth.clientID }}
{{- fail "oauth.clientID is required when oauth.createSecret=true" }}
{{- end }}
{{- if not .Values.oauth.clientSecret }}
{{- fail "oauth.clientSecret is required when oauth.createSecret=true" }}
{{- end }}
{{- end }}
{{- $env := .Values.env | default dict }}
{{- if hasKey $env "OAUTH_CLIENT_ID" }}
{{- fail "env.OAUTH_CLIENT_ID is no longer supported; configure issuerProfiles.profiles[].clientIDSecretRef" }}
{{- end }}
{{- if hasKey $env "OAUTH_CLIENT_SECRET" }}
{{- fail "env.OAUTH_CLIENT_SECRET is no longer supported; configure issuerProfiles.profiles[].clientSecretSecretRef" }}
{{- end }}
{{- if hasKey $env "TOKEN_EXCHANGE_ISSUER_PROFILES_FILE" }}
{{- fail "env.TOKEN_EXCHANGE_ISSUER_PROFILES_FILE is chart-managed; use issuerProfiles.mountPath and issuerProfiles.fileName" }}
{{- end }}
{{- if and .Values.envoyFilter.enabled .Values.authorizationPolicy.enabled }}
{{- fail "envoyFilter.enabled and authorizationPolicy.enabled are mutually exclusive gateway authz modes" }}
{{- end }}
