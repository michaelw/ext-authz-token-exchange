{{- if .Values.gateway.enabled }}
{{- $labels := include "keycloak.labels" . | fromYaml }}
{{- $_ := set $labels "app.kubernetes.io/name" .Values.keycloak.name }}
{{- $values := deepCopy .Values }}
{{- $parentRef := dict "name" .Values.gateway.name "namespace" (include "keycloak.gatewayNamespace" .) }}
{{- $sectionName := include "keycloak.gatewaySectionName" . }}
{{- if $sectionName }}
{{- $_ := set $parentRef "sectionName" $sectionName }}
{{- end }}
{{- $_ := set $values "httpRoutes" (dict "default" (dict
  "namespace" .Values.namespace
  "labels" $labels
  "spec" (dict
    "parentRefs" (dict "default" $parentRef)
    "hostnames" (list .Values.keycloak.externalHost)
    "rules" (dict "default" (dict "backendRefs" (dict "default" (dict "name" .Values.keycloak.name "port" .Values.keycloak.port))))
  )
)) }}
{{- include "common.itsumi.httproutes.tpl" (merge (dict "Values" $values) (omit . "Values")) }}
{{- if eq (include "keycloak.httpRedirectEnabled" .) "true" }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-http-redirect" .Values.keycloak.name | quote }}
  namespace: {{ .Values.namespace | quote }}
  labels:
{{ include "keycloak.labels" . | indent 4 }}
    app.kubernetes.io/name: {{ .Values.keycloak.name | quote }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ include "keycloak.gatewayNamespace" . | quote }}
      sectionName: {{ include "keycloak.httpRedirectSectionName" . | quote }}
  hostnames:
    - {{ .Values.keycloak.externalHost | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
{{- end }}
