apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "keycloak.realmConfigMapName" . | quote }}
  namespace: {{ .Values.namespace | quote }}
  labels:
{{ include "keycloak.labels" . | indent 4 }}
    app.kubernetes.io/name: {{ .Values.keycloak.name | quote }}
data:
  realm.json: |
    {
      "realm": {{ .Values.keycloak.realm | quote }},
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "users": [
        {
          "username": {{ .Values.testUser.username | quote }},
          "enabled": true,
          "email": {{ .Values.testUser.email | quote }},
          "firstName": {{ .Values.testUser.firstName | quote }},
          "lastName": {{ .Values.testUser.lastName | quote }},
          "emailVerified": true,
          "requiredActions": [],
          "clientRoles": {
            "account": [
              "manage-account",
              "manage-consent",
              "view-applications",
              "view-consent",
              "view-profile"
            ]
          },
          "credentials": [
            {
              "type": "password",
              "value": {{ .Values.testUser.password | quote }},
              "temporary": false
            }
          ]
        }
      ],
      "clients": [
        {
          "clientId": {{ .Values.clients.subject.id | quote }},
          "name": "Subject token issuer for ext-authz-token-exchange e2e",
          "enabled": true,
          "publicClient": false,
          "secret": {{ .Values.clients.subject.secret | quote }},
          "clientAuthenticatorType": "client-secret",
          "protocol": "openid-connect",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "defaultClientScopes": [
            "profile"
          ],
          "protocolMappers": [
            {
              "name": {{ printf "aud-%s" .Values.clients.exchanger.id | quote }},
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "consentRequired": false,
              "config": {
                "included.client.audience": {{ .Values.clients.exchanger.id | quote }},
                "access.token.claim": "true",
                "id.token.claim": "false",
                "introspection.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": {{ .Values.clients.exchanger.id | quote }},
          "name": "Token exchanger used by ext-authz-token-exchange",
          "enabled": true,
          "publicClient": false,
          "secret": {{ .Values.clients.exchanger.secret | quote }},
          "clientAuthenticatorType": "client-secret",
          "protocol": "openid-connect",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": true,
          "attributes": {
            "standard.token.exchange.enabled": "true"
          },
          "defaultClientScopes": [
            "profile"
          ],
          "protocolMappers": [
            {
              "name": {{ printf "aud-%s" .Values.clients.audience.id | quote }},
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "consentRequired": false,
              "config": {
                "included.client.audience": {{ .Values.clients.audience.id | quote }},
                "access.token.claim": "true",
                "id.token.claim": "false",
                "introspection.token.claim": "true"
              }
            }
          ]
        },
        {
          "clientId": {{ .Values.clients.audience.id | quote }},
          "name": "Audience requested by ext-authz-token-exchange e2e",
          "enabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false
        }
      ]
    }
