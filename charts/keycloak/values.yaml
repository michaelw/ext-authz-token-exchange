namespace: ext-authz-token-exchange-e2e
pluginNamespace: ext-authz-token-exchange
gatewayProvider: local-istio
gkeGatewayNamespace: gke-gateway

labels:
  partOfKey: app.kubernetes.io/part-of
  partOfValue: ext-authz-token-exchange-e2e

keycloak:
  name: keycloak
  image:
    repository: quay.io/keycloak/keycloak
    pullPolicy: IfNotPresent
  port: 8080
  externalHost: keycloak.int.kube
  externalURL: https://keycloak.int.kube
  adminUsername: admin
  adminPassword: admin
  realm: token-exchange-e2e
  strategy:
    type: Recreate
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "1"
      memory: 1536Mi

clients:
  subject:
    id: tx-subject-client
    secret: tx-subject-secret
  shortTTLSubject:
    id: tx-short-ttl-subject-client
    secret: tx-short-ttl-subject-secret
    accessTokenLifespan: 2
  exchanger:
    id: tx-exchanger-client
    secret: tx-exchanger-secret
  audience:
    id: tx-audience-client

secret:
  name: ext-authz-token-exchange-keycloak-oauth
  clientIDKey: client_id
  clientSecretKey: client_secret

gateway:
  enabled: true
  name: gateway
  namespace: istio-ingress
  sectionName: ""
  httpRedirect:
    enabled: false
    sectionName: http

gkeIap:
  enabled: false
  protection: iap
  policyName: keycloak-iap
  oauthClientID: ""
  oauthClientSecret: ""
  secretName: iap-oauth-client

gkeHealthCheck:
  enabled: false
  name: keycloak
  requestPath: /realms/token-exchange-e2e
  checkIntervalSec: 5
  timeoutSec: 3
  healthyThreshold: 1
  unhealthyThreshold: 2
  logConfig:
    enabled: true

testUser:
  username: token-user
  password: token-user-password
  email: token-user@example.test
  firstName: Token
  lastName: User
