version: v1
scenarios:
  - name: yellow-success
    summary: baseline yellow policy exchanges the incoming bearer token
    request:
      method: GET
      path: /anything/yellow
      token:
        prefill: literal
        value: incoming-yellow
    policy: "{{ .NamespacePrefix }}-yellow/yellow-policy"
    exchange: /token/yellow
    behavior:
      summary: Returns a Bearer access token.
      detail: Returns HTTP 200 with access_token, issued_token_type=access_token, and token_type=Bearer.
    expect:
      status: 200

  - name: red-success
    summary: baseline red policy exchanges the incoming bearer token
    request:
      method: GET
      path: /anything/red
      token:
        prefill: literal
        value: incoming-red
    policy: "{{ .NamespacePrefix }}-red/red-policy"
    exchange: /token/red
    behavior:
      summary: Returns a Bearer access token.
      detail: Returns HTTP 200 with access_token, issued_token_type=access_token, and token_type=Bearer.
    expect:
      status: 200

  - name: blue-success
    summary: baseline blue policy exchanges the incoming bearer token
    request:
      method: GET
      path: /anything/blue
      token:
        prefill: literal
        value: incoming-blue
    policy: "{{ .NamespacePrefix }}-blue/blue-policy"
    exchange: /token/blue
    behavior:
      summary: Returns a Bearer access token.
      detail: Returns HTTP 200 with access_token, issued_token_type=access_token, and token_type=Bearer.
    expect:
      status: 200

  - name: missing-bearer
    summary: matched request without Authorization receives a bearer challenge
    request:
      method: GET
      path: /anything/yellow
      token:
        prefill: none
    policy: "{{ .NamespacePrefix }}-yellow/yellow-policy"
    behavior:
      summary: Denied before token exchange.
      detail: The plugin returns this denial directly, so the fake issuer is not called.
    expect:
      status: 401
      error: bearer_token_required
      wwwAuthenticateContains: 'Bearer realm="ext-authz-token-exchange-e2e"'

  - name: cors-preflight
    summary: true CORS preflight bypasses token exchange and reaches httpbin
    request:
      method: OPTIONS
      path: /anything/yellow
      token:
        prefill: none
      headers:
        Origin: https://client.example.test
        Access-Control-Request-Method: GET
        Access-Control-Request-Headers: Authorization
    policy: "{{ .NamespacePrefix }}-yellow/yellow-policy"
    behavior:
      summary: Preflight bypasses token exchange.
      detail: This is a true CORS preflight request, so the plugin allows it through without calling the token endpoint.
    expect:
      status: 200
      corsOrigin: https://client.example.test

  - name: options-missing-bearer
    summary: OPTIONS without bearer and without CORS preflight headers receives a bearer challenge
    request:
      method: OPTIONS
      path: /anything/yellow
      token:
        prefill: none
    policy: "{{ .NamespacePrefix }}-yellow/yellow-policy"
    behavior:
      summary: Denied before token exchange.
      detail: The plugin returns this denial directly, so the fake issuer is not called.
    expect:
      status: 401
      error: bearer_token_required
      wwwAuthenticateContains: 'Bearer realm="ext-authz-token-exchange-e2e"'

  - name: options-bearer
    summary: OPTIONS with a bearer token is not preflight; watch fake endpoint logs for the exchange
    request:
      method: OPTIONS
      path: /anything/yellow
      token:
        prefill: literal
        value: options-token
    policy: "{{ .NamespacePrefix }}-yellow/yellow-policy"
    exchange: /token/yellow
    behavior:
      summary: Returns a Bearer access token.
      detail: Returns HTTP 200 with access_token, issued_token_type=access_token, and token_type=Bearer.
    expect:
      status: 200

  - name: unmatched
    summary: unmatched traffic passes through unchanged when default deny is disabled
    request:
      method: GET
      path: /anything/no-policy-match
      token:
        prefill: literal
        value: original-token
    behavior:
      summary: Passes through without token exchange.
      detail: The plugin allows this request through unchanged, so the fake issuer is not called.
    expect:
      status: 200
      upstreamAuthorization: Bearer original-token

  - name: explicit-deny
    summary: explicit deny policy rejects a matched route without token exchange
    request:
      method: GET
      path: /anything/denied
      token:
        prefill: literal
        value: denied-token
    policy: "{{ .NamespacePrefix }}-red/denied-policy"
    behavior:
      summary: Denied before token exchange.
      detail: The plugin returns this denial directly, so the fake issuer is not called.
    expect:
      status: 403
      error: policy_denied

  - name: invalid-target
    summary: token endpoint invalid_target maps to downstream OAuth error
    request:
      method: GET
      path: /anything/error-invalid-target
      token:
        prefill: literal
        value: incoming-error
    policy: "{{ .NamespacePrefix }}-red/error-invalid-target-policy"
    exchange: /token/invalid-target
    behavior:
      summary: Rejects requested resource/audience target.
      detail: Returns HTTP 400 with OAuth/RFC8693 error invalid_target. This represents a resource or audience the authorization server will not issue for.
    expect:
      status: 400
      error: invalid_target

  - name: invalid-grant
    summary: token endpoint rejects the incoming subject token as invalid
    request:
      method: GET
      path: /anything/error-invalid-grant
      token:
        prefill: literal
        value: incoming-invalid-grant
    policy: "{{ .NamespacePrefix }}-red/error-invalid-grant-policy"
    exchange: /token/invalid-grant
    behavior:
      summary: Rejects the subject token as invalid.
      detail: Returns HTTP 400 with OAuth error invalid_grant. This represents an incoming subject token the authorization server does not accept.
    expect:
      status: 400
      error: invalid_grant

  - name: expired-subject-token
    summary: token endpoint rejects an expired but validly shaped subject token
    request:
      method: GET
      path: /anything/error-expired-subject-token
      token:
        prefill: literal
        value: eyJhbGciOiJub25lIn0.eyJleHAiOjF9.
    policy: "{{ .NamespacePrefix }}-red/error-expired-subject-token-policy"
    exchange: /token/expired-subject-token
    behavior:
      summary: Rejects an expired subject token.
      detail: Returns HTTP 400 with OAuth error invalid_grant for an expired but otherwise validly shaped subject token.
    expect:
      status: 400
      error: invalid_grant

  - name: unauthorized
    summary: token endpoint 401 preserves WWW-Authenticate
    request:
      method: GET
      path: /anything/error-unauthorized
      token:
        prefill: literal
        value: incoming-error
    policy: "{{ .NamespacePrefix }}-red/error-unauthorized-policy"
    exchange: /token/unauthorized
    behavior:
      summary: Rejects the token client.
      detail: Returns HTTP 401 with OAuth error invalid_client and a WWW-Authenticate challenge from the issuer.
    expect:
      status: 401
      error: invalid_client
      wwwAuthenticateContains: 'Bearer realm="issuer"'

  - name: forbidden
    summary: token endpoint 403 is treated as token-service failure
    request:
      method: GET
      path: /anything/error-forbidden
      token:
        prefill: literal
        value: incoming-error
    policy: "{{ .NamespacePrefix }}-red/error-forbidden-policy"
    exchange: /token/forbidden
    behavior:
      summary: Rejects target with a forbidden response.
      detail: Returns HTTP 403 with invalid_target. The plugin treats this as token-service failure rather than request malformation.
    expect:
      status: 500
      error: invalid_target

  - name: malformed
    summary: malformed token success response is rejected
    request:
      method: GET
      path: /anything/error-malformed
      token:
        prefill: literal
        value: incoming-error
    policy: "{{ .NamespacePrefix }}-red/error-malformed-policy"
    exchange: /token/malformed
    behavior:
      summary: Returns malformed success JSON.
      detail: Returns HTTP 200 with broken JSON, exercising the plugin's invalid token response handling.
    expect:
      status: 500
      error: invalid_request

  - name: keycloak-audience
    summary: Keycloak issuer exchanges the inbound subject token for the target audience
    requires:
      issuer: local-keycloak
    request:
      method: GET
      path: /anything/keycloak-audience
      token:
        prefill: keycloak-subject
    policy: "{{ .NamespacePrefix }}-yellow/yellow-policy"
    exchange: Keycloak token exchange endpoint
    behavior:
      summary: Keycloak performs standard token exchange for the requested audience.
      detail: Keycloak validates the inbound subject token and returns a signed access token for tx-audience-client.
    expect:
      status: 200

  - name: keycloak-resource
    summary: Keycloak issuer exchanges with resource and audience requested by policy
    requires:
      issuer: local-keycloak
    request:
      method: GET
      path: /anything/keycloak-resource
      token:
        prefill: keycloak-subject
    policy: "{{ .NamespacePrefix }}-yellow/keycloak-resource-policy"
    exchange: Keycloak token exchange endpoint
    behavior:
      summary: Keycloak receives a token exchange request with resource and audience parameters.
      detail: The plugin policy requests resource=https://httpbin.int.kube/anything/keycloak-resource and audience=tx-audience-client; Keycloak returns a signed access token for the configured audience.
    expect:
      status: 200

  - name: keycloak-expired-subject-token
    summary: Keycloak rejects an expired subject token
    requires:
      issuer: local-keycloak
    request:
      method: GET
      path: /anything/keycloak-expired-subject-token
      token:
        prefill: keycloak-expired-subject
    policy: "{{ .NamespacePrefix }}-yellow/keycloak-expired-subject-token-policy"
    exchange: Keycloak token exchange endpoint
    behavior:
      summary: Keycloak rejects a subject token whose lifetime has elapsed.
      detail: The demo fetches a short-lived subject token, waits for it to expire, and verifies the plugin maps Keycloak's rejection to a safe OAuth error.
    expect:
      status: 400

  - name: keycloak-unsigned-subject-token
    summary: Keycloak rejects an unsigned subject token
    requires:
      issuer: local-keycloak
    request:
      method: GET
      path: /anything/keycloak-unsigned-subject-token
      token:
        prefill: keycloak-unsigned-subject
    policy: "{{ .NamespacePrefix }}-yellow/keycloak-unsigned-subject-token-policy"
    exchange: Keycloak token exchange endpoint
    behavior:
      summary: Keycloak rejects a JWT-shaped subject token with alg=none.
      detail: The plugin forwards the unsigned subject token to Keycloak and returns only a sanitized OAuth error to the downstream caller.
    expect:
      status: 400

  - name: keycloak-truncated-signature
    summary: Keycloak rejects a subject token with its signature removed
    requires:
      issuer: local-keycloak
    request:
      method: GET
      path: /anything/keycloak-truncated-signature
      token:
        prefill: keycloak-truncated-signature
    policy: "{{ .NamespacePrefix }}-yellow/keycloak-truncated-signature-policy"
    exchange: Keycloak token exchange endpoint
    behavior:
      summary: Keycloak rejects a signed subject token after the signature segment is cut off.
      detail: This exercises malformed JWT signature handling while keeping Keycloak error details out of the downstream response.
    expect:
      status: 400

  - name: keycloak-untrusted-issuer
    summary: Keycloak rejects a subject token from an untrusted issuer
    requires:
      issuer: local-keycloak
    request:
      method: GET
      path: /anything/keycloak-untrusted-issuer
      token:
        prefill: keycloak-untrusted-issuer
    policy: "{{ .NamespacePrefix }}-yellow/keycloak-untrusted-issuer-policy"
    exchange: Keycloak token exchange endpoint
    behavior:
      summary: Keycloak rejects a signed subject token whose issuer is not trusted by the realm.
      detail: The token is signed locally for the demo, but Keycloak does not trust that issuer or key and the plugin returns a safe OAuth error.
    expect:
      status: 400

  - name: keycloak-invalid-audience
    summary: Keycloak rejects a token exchange request for an unknown audience
    requires:
      issuer: local-keycloak
    request:
      method: GET
      path: /anything/keycloak-invalid-audience
      token:
        prefill: keycloak-subject
    policy: "{{ .NamespacePrefix }}-yellow/keycloak-invalid-audience-policy"
    exchange: Keycloak token exchange endpoint
    behavior:
      summary: Keycloak rejects a token exchange request whose audience is not configured in the realm.
      detail: The subject token is valid, but the policy asks for tx-missing-audience-client and the plugin returns a safe OAuth error.
    expect:
      status: 400

  - name: keycloak-invalid-scope
    summary: Keycloak rejects a token exchange request for an invalid scope
    requires:
      issuer: local-keycloak
    request:
      method: GET
      path: /anything/keycloak-invalid-scope
      token:
        prefill: keycloak-subject
    policy: "{{ .NamespacePrefix }}-yellow/keycloak-invalid-scope-policy"
    exchange: Keycloak token exchange endpoint
    behavior:
      summary: Keycloak rejects a token exchange request for a scope the client cannot receive.
      detail: The subject token is valid, but the policy asks for tx-missing-scope and the plugin returns a safe OAuth error.
    expect:
      status: 400
